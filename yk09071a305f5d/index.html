<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FAF3F4">
<title>foodlog YK</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="../icon-192.png">
<style>
  /* foodlog-YK：薄いピンク基調のライトテーマ。警告用の赤・オレンジはパレットに置かない（設計制約） */
  :root {
    /* 文字色はWCAG AA（4.5:1）を満たす濃さ。ピンクの世界観はティントと塗りが担う */
    --bg:#FAF3F4; --surface:#FFFFFF; --surface2:#F6E9EC; --line:#EBD8DD; --line-strong:#AD8290;
    --rose:#C96F8A; --rose-text:#A8506E; --text:#3D3237; --muted:#776069;
    --green:#3A7A4C; --blue:#47719A;
    --r-s:6px; --r-m:10px; --r-l:14px; --r-full:999px;
    --tint-rose:rgba(201,111,138,.10); --tint-green:rgba(76,158,99,.10); --tint-blue:rgba(91,143,184,.10);
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;
    padding-bottom:env(safe-area-inset-bottom); font-size:15px;
  }
  #app { max-width:480px; margin:0 auto; padding:0; }
  .mono { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-variant-numeric:tabular-nums; }
  button { font-family:inherit; }
  input, textarea, select { font-family:inherit; color:var(--text); }
  input::placeholder, textarea::placeholder { color:var(--muted); opacity:.8; }

  .tabs { display:flex; gap:6px; padding:14px 16px 8px; }
  .tab {
    flex:1; padding:9px 0; border-radius:var(--r-m); font-size:15px; font-weight:700;
    border:1px solid var(--line); background:var(--surface); color:var(--muted); cursor:pointer;
  }
  .tab.on { border-color:var(--rose); background:var(--tint-rose); color:var(--rose-text); }

  .datenav { display:flex; align-items:center; justify-content:space-between; padding:4px 16px 10px; }
  .navbtn {
    background:var(--surface); border:1px solid var(--line); color:var(--text);
    width:38px; height:38px; border-radius:var(--r-m); font-size:17px; cursor:pointer;
  }
  .navbtn:disabled { opacity:.25; }
  .datetitle { font-size:18px; font-weight:700; letter-spacing:.5px; text-align:center; }
  .todaybtn { background:none; border:none; color:var(--rose-text); font-size:13px; margin-top:2px; cursor:pointer; display:block; width:100%; }

  .banner {
    margin:0 16px 10px; padding:10px 14px; border-radius:var(--r-m); font-size:13px;
    background:var(--tint-blue); color:#3E6C90; border:1px solid rgba(91,143,184,.3);
  }
  .banner.protect { background:var(--tint-rose); color:#A2566E; border-color:rgba(201,111,138,.3); }

  .card { background:var(--surface); border:1px solid var(--line); border-radius:var(--r-l); }
  .section { padding:14px 16px 0; }
  .seclabel { color:var(--muted); font-size:12px; letter-spacing:1.5px; font-weight:700; margin-bottom:8px; }

  /* メイン3ゲージ（数値は隠さない） */
  .g3 { margin:0 16px; padding:14px 16px 6px; }
  .grow { padding:8px 0 12px; border-bottom:1px solid var(--line); }
  .grow:last-child { border-bottom:none; }
  .ghead { display:flex; align-items:baseline; gap:8px; }
  .gname { font-size:14px; font-weight:700; }
  .gnum { margin-left:auto; font-size:22px; font-weight:800; }
  .gunit { font-size:13px; color:var(--muted); font-weight:600; }
  .hbar { height:10px; border-radius:var(--r-full); background:var(--surface2); overflow:hidden; margin-top:7px; position:relative; }
  .hbar .fill { height:100%; border-radius:inherit; transition:width .5s cubic-bezier(.22,1,.36,1); }
  .gnote { font-size:12px; margin-top:6px; }
  .gnote.ok { color:var(--green); font-weight:600; }
  .gnote.info { color:var(--blue); }
  .gsub { display:flex; align-items:center; gap:8px; margin-top:8px; font-size:12.5px; color:var(--muted); }
  .gsub .hbar { flex:1; height:6px; margin-top:0; }

  /* 週次サブゲージ */
  .subs { display:flex; flex-wrap:wrap; gap:6px; padding:10px 16px 0; }
  .sub {
    display:inline-flex; align-items:center; gap:5px; height:32px; padding:0 12px;
    border:1px solid var(--line); background:var(--surface); border-radius:var(--r-full);
    font-size:12.5px; color:var(--muted); font-weight:600;
  }
  .sub.met { border-color:var(--green); background:var(--tint-green); color:var(--green); }

  /* 体重 */
  .wcard { margin:12px 16px 0; padding:12px 16px; display:flex; align-items:baseline; gap:8px 10px; flex-wrap:wrap; }
  .wcard .fatline { flex-basis:100%; font-size:12.5px; color:var(--muted); }
  .wcard .num { font-size:24px; font-weight:800; }
  .wcard input {
    width:76px; text-align:center; background:var(--surface2); border:1px solid var(--line-strong);
    border-radius:var(--r-m); padding:7px 4px; font-size:17px; font-weight:700; outline:none;
  }
  .wnote { font-size:12.5px; margin:6px 16px 0; }
  .wnote.up { color:var(--green); }
  .wnote.low { color:var(--blue); }

  /* 疲労度 */
  .fatigue { display:flex; gap:8px; padding:12px 16px 0; }
  .fbtn {
    flex:1; padding:10px 0; border-radius:var(--r-m); font-size:13px; font-weight:600;
    border:1px solid var(--line-strong); background:var(--surface); color:var(--muted); cursor:pointer;
  }
  .fbtn.on { border-color:var(--rose); background:var(--tint-rose); color:var(--rose-text); }

  /* タイムライン */
  .slothead { font-size:12px; font-weight:700; color:var(--muted); letter-spacing:1px; padding:10px 2px 2px; }
  .foodrow { display:flex; align-items:center; justify-content:space-between; padding:9px 2px; border-bottom:1px solid var(--line); }
  .foodrow:last-child { border-bottom:none; }
  .foodname { flex:1; min-width:0; font-size:15px; display:flex; align-items:center; gap:6px; }
  .foodname .nm { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .badges { font-size:11px; flex-shrink:0; }
  .foodnums { display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .delbtn { background:none; border:none; color:var(--muted); font-size:14px; cursor:pointer; padding:4px; }
  .emptymsg { color:var(--muted); font-size:13px; text-align:center; padding:16px 0; }

  .movechips { display:flex; gap:6px; align-items:center; flex-wrap:wrap; padding:10px 16px 0; }
  .mclabel { font-size:12px; color:var(--muted); flex-shrink:0; }
  .chip {
    height:30px; display:inline-flex; align-items:center; padding:0 12px;
    border:1px solid var(--line-strong); background:var(--surface); color:var(--muted);
    border-radius:var(--r-full); font-size:13px; cursor:pointer;
  }
  .chip:active, .chip.on { border-color:var(--rose); color:var(--rose-text); }
  .chip.on { background:var(--tint-rose); } /* 持続する選択はティントで示す（UI規約） */

  /* 下部スティッキー入力（テキストのみ・写真ボタンなし） */
  .stickybar {
    position:sticky; bottom:0; z-index:20; margin-top:16px;
    background:var(--bg); border-top:1px solid var(--line);
    padding-bottom:calc(8px + env(safe-area-inset-bottom));
  }
  .slotchips { display:flex; gap:6px; padding:8px 16px 0; }
  .slotchips .chip { height:28px; font-size:12.5px; }
  .inputrow { display:flex; gap:8px; align-items:flex-end; padding:8px 16px 0; }
  textarea.mealinput {
    flex:1; background:var(--surface); border:1px solid var(--line-strong); border-radius:var(--r-l);
    padding:11px 14px; font-size:16px; outline:none; resize:none; line-height:1.5; min-width:0;
  }
  .sendbtn {
    background:var(--rose); border:none; color:#fff; border-radius:var(--r-l);
    width:48px; height:48px; font-size:19px; cursor:pointer; flex-shrink:0;
  }
  .sendbtn:disabled { background:var(--surface2); color:var(--muted); }
  .hint { font-size:11.5px; color:var(--muted); margin:5px 16px 0; }
  .errmsg { font-size:12.5px; color:var(--blue); margin:5px 16px 0; }

  /* ボタン階層（foodlogのUI規約を踏襲） */
  .btn-s {
    height:32px; padding:0 14px; display:inline-flex; align-items:center; gap:5px;
    background:transparent; border:1px solid var(--line); color:var(--muted);
    border-radius:var(--r-m); font-size:13px; font-weight:600; cursor:pointer; flex-shrink:0;
  }
  .btn-s:active { border-color:var(--rose); color:var(--rose-text); }
  .setbox { margin:0 0 14px; padding:14px 16px; }
  .settitle { font-size:14px; font-weight:700; margin-bottom:6px; }
  .setdesc { font-size:12px; color:var(--muted); line-height:1.7; margin-bottom:10px; }
  .setinput {
    width:100%; background:var(--surface2); border:1px solid var(--line-strong); border-radius:var(--r-m);
    padding:9px 11px; font-size:14px; outline:none;
  }
  .setrow { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .setbtn {
    background:var(--rose); border:none; color:#fff; border-radius:var(--r-m);
    padding:9px 16px; font-size:13px; font-weight:700; cursor:pointer;
  }
  .setbtn.ghost { background:transparent; border:1px solid var(--line); color:var(--muted); }
  .okmsg { font-size:12.5px; color:var(--green); margin-top:8px; }
  .field { display:flex; align-items:center; gap:8px; margin-top:8px; font-size:13px; }
  .field label { flex:1; color:var(--muted); }
  .field input, .field select {
    width:110px; background:var(--surface2); border:1px solid var(--line-strong); border-radius:var(--r-s);
    padding:7px 8px; font-size:14px; outline:none; text-align:center;
  }
  .spin { display:inline-block; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="importInput" accept="application/json" style="display:none">
<script src="app.js"></script>
</body>
</html>
